<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<title>Asteroids Arcade</title>
		<style>
			body {
				margin: 0;
				background: black;
				overflow: hidden;
				font-family: monospace;
				color: #0f0;
			}

			canvas {
				display: block;
				image-rendering: pixelated;
				position: absolute;
				top: 0;
				left: 0;
				z-index: 0;
			}

			#menu,
			#gameover {
				position: absolute;
				width: 100%;
				height: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				z-index: 10;
			}

			.hidden {
				display: none !important;
			}
		</style>
	</head>
	<body>
		<div id="menu">
			<h1>ASTEROIDS ARCADE</h1>
			<p>Press ENTER</p>
		</div>

		<div id="gameover" class="hidden">
			<h1>GAME OVER</h1>
			<p>Press ENTER</p>
		</div>

		<canvas id="game"></canvas>

		<script>
			const canvas = document.getElementById("game");
			const ctx = canvas.getContext("2d");
			canvas.width = innerWidth;
			canvas.height = innerHeight;

			/* ================= SPRITES PRO ================= */

			// 🚀 Nave mejorada
			const shipSprite = [
				"0001000",
				"0011100",
				"0111110",
				"1111111",
				"0011100",
				"0100010",
				"1000001",
			];

			// ☄️ Asteroides variados
			const asteroidSprites = [
				["01110", "11111", "11111", "11111", "01110"],
				["11110", "11111", "01111", "11111", "11110"],
				["01111", "11111", "11110", "11111", "01110"],
			];

			function drawSprite(sprite, x, y, scale, color) {
				ctx.fillStyle = color;
				for (let r = 0; r < sprite.length; r++) {
					for (let c = 0; c < sprite[r].length; c++) {
						if (sprite[r][c] === "1") {
							ctx.fillRect(
								x + c * scale,
								y + r * scale,
								scale,
								scale,
							);
						}
					}
				}
			}

			/* ================= STATE ================= */

			let state = "menu";
			let keys = {};

			let bullets = [];
			let asteroids = [];
			let particles = [];
			let powerups = [];

			let score = 0;
			let lives = 3;
			let level = 1;

			let spawnTimer = 0;
			let powerTimer = 0;
			let lastShot = 0;

			const player = {
				x: canvas.width / 2,
				y: canvas.height / 2,
				angle: 0,
				vx: 0,
				vy: 0,
				invul: 0,
				shield: false,
				double: false,
			};

			/* ================= INPUT ================= */

			document.addEventListener("keydown", (e) => {
				keys[e.code] = true;

				if (e.code === "Enter") {
					if (state !== "game") startGame();
				}
			});
			document.addEventListener("keyup", (e) => (keys[e.code] = false));

			/* ================= GAME ================= */

			function startGame() {
				state = "game";

				bullets = [];
				asteroids = [];
				particles = [];
				powerups = [];
				score = 0;
				lives = 3;
				level = 1;

				player.x = canvas.width / 2;
				player.y = canvas.height / 2;
				player.vx = 0;
				player.vy = 0;
				player.invul = 120;

				spawnTimer = 0;
				powerTimer = 0;

				const menu = document.getElementById("menu");
				menu.classList.add("hidden");
				menu.style.display = "none";
				menu.innerHTML = "";

				document.getElementById("gameover").classList.add("hidden");
			}

			// spawn con sprite aleatorio
			function spawnAsteroid() {
				let x, y, d;
				do {
					x = Math.random() * canvas.width;
					y = Math.random() * canvas.height;
					d = Math.hypot(player.x - x, player.y - y);
				} while (d < 150);

				asteroids.push({
					x,
					y,
					vx: (Math.random() - 0.5) * (2 + level * 0.3),
					vy: (Math.random() - 0.5) * (2 + level * 0.3),
					size: 20,
					sprite: asteroidSprites[
						Math.floor(Math.random() * asteroidSprites.length)
					],
				});
			}

			function spawnPower() {
				const types = ["shield", "double"];
				powerups.push({
					x: Math.random() * canvas.width,
					y: Math.random() * canvas.height,
					type: types[Math.floor(Math.random() * 2)],
				});
			}

			function shoot() {
				if (Date.now() - lastShot < 200) return;
				lastShot = Date.now();

				bullets.push({ x: player.x, y: player.y, a: player.angle });

				if (player.double) {
					bullets.push({
						x: player.x,
						y: player.y,
						a: player.angle + 0.2,
					});
				}
			}

			function explode(x, y) {
				for (let i = 0; i < 10; i++) {
					particles.push({
						x,
						y,
						vx: (Math.random() - 0.5) * 3,
						vy: (Math.random() - 0.5) * 3,
						life: 20,
					});
				}
			}

			/* ================= UPDATE ================= */

			function update() {
				if (state !== "game") return;

				if (keys["ArrowLeft"]) player.angle -= 0.05;
				if (keys["ArrowRight"]) player.angle += 0.05;

				if (keys["ArrowUp"]) {
					player.vx += Math.cos(player.angle) * 0.1;
					player.vy += Math.sin(player.angle) * 0.1;
				}

				if (keys["Space"]) shoot();

				player.vx *= 0.99;
				player.vy *= 0.99;
				player.x += player.vx;
				player.y += player.vy;
				wrap(player);

				// spawn
				spawnTimer++;
				if (spawnTimer > 80 - Math.min(level * 5, 50)) {
					spawnAsteroid();
					spawnTimer = 0;
				}

				powerTimer++;
				if (powerTimer > 400) {
					spawnPower();
					powerTimer = 0;
				}

				// bullets
				bullets.forEach((b, i) => {
					b.x += Math.cos(b.a) * 6;
					b.y += Math.sin(b.a) * 6;
					if (out(b)) bullets.splice(i, 1);
				});

				// asteroids
				asteroids.forEach((a) => {
					a.x += a.vx;
					a.y += a.vy;
					wrap(a);

					let d = Math.hypot(player.x - a.x, player.y - a.y);

					if (d < 20 && player.invul <= 0) {
						explode(player.x, player.y);
						lives--;
						player.invul = 120;

						if (lives <= 0) {
							state = "gameover";
							document
								.getElementById("gameover")
								.classList.remove("hidden");
						}
					}
				});

				// hits
				bullets.forEach((b, bi) => {
					asteroids.forEach((a, ai) => {
						let d = Math.hypot(b.x - a.x, b.y - a.y);
						if (d < 15) {
							explode(a.x, a.y);
							bullets.splice(bi, 1);
							asteroids.splice(ai, 1);
							score += 10;
						}
					});
				});

				// powerups
				powerups.forEach((p, pi) => {
					let d = Math.hypot(player.x - p.x, player.y - p.y);
					if (d < 20) {
						if (p.type === "shield") player.shield = true;
						if (p.type === "double") player.double = true;

						powerups.splice(pi, 1);

						setTimeout(() => {
							player.shield = false;
							player.double = false;
						}, 5000);
					}
				});

				// partículas
				particles.forEach((p, i) => {
					p.x += p.vx;
					p.y += p.vy;
					p.life--;
					if (p.life <= 0) particles.splice(i, 1);
				});

				if (player.invul > 0) player.invul--;

				if (score > level * 200) level++;
			}

			/* ================= DRAW ================= */

			function draw() {
				ctx.fillStyle = "black";
				ctx.fillRect(0, 0, canvas.width, canvas.height);

				if (state === "menu") return;

				// nave con color dinámico
				if (player.invul % 20 < 10) {
					ctx.save();
					ctx.translate(player.x, player.y);
					ctx.rotate(player.angle);

					drawSprite(
						shipSprite,
						-14,
						-14,
						4,
						player.shield ? "#0ff" : "#0f0",
					);

					// 🔥 motor
					ctx.fillStyle = "orange";
					ctx.fillRect(-2, 14, 4, 6);

					ctx.restore();
				}

				// asteroides
				asteroids.forEach((a) => {
					drawSprite(a.sprite, a.x - 10, a.y - 10, 4, "#888");
				});

				// balas
				ctx.fillStyle = "#0f0";
				bullets.forEach((b) => ctx.fillRect(b.x, b.y, 3, 3));

				// partículas
				particles.forEach((p) => {
					ctx.fillRect(p.x, p.y, 2, 2);
				});

				// powerups
				powerups.forEach((p) => {
					ctx.fillStyle = p.type === "shield" ? "#0ff" : "#ff0";
					ctx.fillRect(p.x - 5, p.y - 5, 10, 10);
				});

				// HUD
				ctx.fillText("Score: " + score, 10, 20);
				ctx.fillText("Lives: " + lives, 10, 40);
				ctx.fillText("Level: " + level, 10, 60);
			}

			/* ================= HELPERS ================= */

			function wrap(o) {
				if (o.x < 0) o.x = canvas.width;
				if (o.x > canvas.width) o.x = 0;
				if (o.y < 0) o.y = canvas.height;
				if (o.y > canvas.height) o.y = 0;
			}

			function out(o) {
				return (
					o.x < 0 ||
					o.x > canvas.width ||
					o.y < 0 ||
					o.y > canvas.height
				);
			}

			/* ================= LOOP ================= */

			function loop() {
				update();
				draw();
				requestAnimationFrame(loop);
			}
			loop();
		</script>
	</body>
</html>
